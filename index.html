<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💞SATORI💞 hasło Terminal</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #00ff00;
    font-family: 'Courier New', Courier, monospace;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  #prompt-label {
    font-size: 1.2rem;
    color: #00ff00;
    letter-spacing: 0.08em;
    text-shadow: 0 0 8px #00ff0055;
  }

  #dots-display {
    font-size: 1.4rem;
    letter-spacing: 0.3em;
    color: #00ff00;
    min-height: 1.6rem;
    text-align: center;
    text-shadow: 0 0 6px #00ff0055;
  }

  #hidden-input {
    position: absolute;
    opacity: 0;
    pointer-events: none;
    width: 1px;
    height: 1px;
  }

  #error-msg {
    font-size: 0.85rem;
    color: #ff4444;
    min-height: 1rem;
    text-align: center;
    letter-spacing: 0.05em;
  }

  /* MATRIX CANVAS */
  #matrix-canvas {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 10;
  }

  /* Cursor blink on dots */
  #cursor {
    display: inline-block;
    width: 0.6em;
    height: 1.2em;
    background: #00ff00;
    vertical-align: middle;
    margin-left: 2px;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
</style>
</head>
<body>

<div id="login-screen">
  <div id="prompt-label">Podaj hasło:</div>
  <div id="dots-display"><span id="dots-text"></span><span id="cursor"></span></div>
  <div id="error-msg"></div>
</div>

<canvas id="matrix-canvas"></canvas>
<input id="hidden-input" type="text" autocomplete="off" autocorrect="off" spellcheck="false">

<script>
// ── MD5 implementation (pure JS) ──────────────────────────────────────────────
function md5(string) {
  function safeAdd(x, y) {
    const lsw = (x & 0xffff) + (y & 0xffff);
    const msw = (x >> 16) + (y >> 16) + (lsw >> 16);
    return (msw << 16) | (lsw & 0xffff);
  }
  function bitRotateLeft(num, cnt) { return (num << cnt) | (num >>> (32 - cnt)); }
  function md5cmn(q, a, b, x, s, t) { return safeAdd(bitRotateLeft(safeAdd(safeAdd(a, q), safeAdd(x, t)), s), b); }
  function md5ff(a,b,c,d,x,s,t){return md5cmn((b&c)|((~b)&d),a,b,x,s,t);}
  function md5gg(a,b,c,d,x,s,t){return md5cmn((b&d)|(c&(~d)),a,b,x,s,t);}
  function md5hh(a,b,c,d,x,s,t){return md5cmn(b^c^d,a,b,x,s,t);}
  function md5ii(a,b,c,d,x,s,t){return md5cmn(c^(b|(~d)),a,b,x,s,t);}

  const str8 = unescape(encodeURIComponent(string));
  const len8 = str8.length;
  const n32 = ((len8 + 8) >> 6) + 1;
  const m = new Array(n32 * 16).fill(0);
  for (let i = 0; i < len8; i++) m[i >> 2] |= str8.charCodeAt(i) << ((i % 4) * 8);
  m[len8 >> 2] |= 0x80 << ((len8 % 4) * 8);
  m[n32 * 16 - 2] = len8 * 8;

  let a = 1732584193, b = -271733879, c = -1732584194, d = 271733878;
  for (let i = 0; i < m.length; i += 16) {
    const [aa,bb,cc,dd] = [a,b,c,d];
    a=md5ff(a,b,c,d,m[i+0],7,-680876936); d=md5ff(d,a,b,c,m[i+1],12,-389564586);
    c=md5ff(c,d,a,b,m[i+2],17,606105819); b=md5ff(b,c,d,a,m[i+3],22,-1044525330);
    a=md5ff(a,b,c,d,m[i+4],7,-176418897); d=md5ff(d,a,b,c,m[i+5],12,1200080426);
    c=md5ff(c,d,a,b,m[i+6],17,-1473231341); b=md5ff(b,c,d,a,m[i+7],22,-45705983);
    a=md5ff(a,b,c,d,m[i+8],7,1770035416); d=md5ff(d,a,b,c,m[i+9],12,-1958414417);
    c=md5ff(c,d,a,b,m[i+10],17,-42063); b=md5ff(b,c,d,a,m[i+11],22,-1990404162);
    a=md5ff(a,b,c,d,m[i+12],7,1804603682); d=md5ff(d,a,b,c,m[i+13],12,-40341101);
    c=md5ff(c,d,a,b,m[i+14],17,-1502002290); b=md5ff(b,c,d,a,m[i+15],22,1236535329);
    a=md5gg(a,b,c,d,m[i+1],5,-165796510); d=md5gg(d,a,b,c,m[i+6],9,-1069501632);
    c=md5gg(c,d,a,b,m[i+11],14,643717713); b=md5gg(b,c,d,a,m[i+0],20,-373897302);
    a=md5gg(a,b,c,d,m[i+5],5,-701558691); d=md5gg(d,a,b,c,m[i+10],9,38016083);
    c=md5gg(c,d,a,b,m[i+15],14,-660478335); b=md5gg(b,c,d,a,m[i+4],20,-405537848);
    a=md5gg(a,b,c,d,m[i+9],5,568446438); d=md5gg(d,a,b,c,m[i+14],9,-1019803690);
    c=md5gg(c,d,a,b,m[i+3],14,-187363961); b=md5gg(b,c,d,a,m[i+8],20,1163531501);
    a=md5gg(a,b,c,d,m[i+13],5,-1444681467); d=md5gg(d,a,b,c,m[i+2],9,-51403784);
    c=md5gg(c,d,a,b,m[i+7],14,1735328473); b=md5gg(b,c,d,a,m[i+12],20,-1926607734);
    a=md5hh(a,b,c,d,m[i+5],4,-378558); d=md5hh(d,a,b,c,m[i+8],11,-2022574463);
    c=md5hh(c,d,a,b,m[i+11],16,1839030562); b=md5hh(b,c,d,a,m[i+14],23,-35309556);
    a=md5hh(a,b,c,d,m[i+1],4,-1530992060); d=md5hh(d,a,b,c,m[i+4],11,1272893353);
    c=md5hh(c,d,a,b,m[i+7],16,-155497632); b=md5hh(b,c,d,a,m[i+10],23,-1094730640);
    a=md5hh(a,b,c,d,m[i+13],4,681279174); d=md5hh(d,a,b,c,m[i+0],11,-358537222);
    c=md5hh(c,d,a,b,m[i+3],16,-722521979); b=md5hh(b,c,d,a,m[i+6],23,76029189);
    a=md5hh(a,b,c,d,m[i+9],4,-640364487); d=md5hh(d,a,b,c,m[i+12],11,-421815835);
    c=md5hh(c,d,a,b,m[i+15],16,530742520); b=md5hh(b,c,d,a,m[i+2],23,-995338651);
    a=md5ii(a,b,c,d,m[i+0],6,-198630844); d=md5ii(d,a,b,c,m[i+7],10,1126891415);
    c=md5ii(c,d,a,b,m[i+14],15,-1416354905); b=md5ii(b,c,d,a,m[i+5],21,-57434055);
    a=md5ii(a,b,c,d,m[i+12],6,1700485571); d=md5ii(d,a,b,c,m[i+3],10,-1894986606);
    c=md5ii(c,d,a,b,m[i+10],15,-1051523); b=md5ii(b,c,d,a,m[i+1],21,-2054922799);
    a=md5ii(a,b,c,d,m[i+8],6,1873313359); d=md5ii(d,a,b,c,m[i+15],10,-30611744);
    c=md5ii(c,d,a,b,m[i+6],15,-1560198380); b=md5ii(b,c,d,a,m[i+13],21,1309151649);
    a=md5ii(a,b,c,d,m[i+4],6,-145523070); d=md5ii(d,a,b,c,m[i+11],10,-1120210379);
    c=md5ii(c,d,a,b,m[i+2],15,718787259); b=md5ii(b,c,d,a,m[i+9],21,-343485551);
    a=safeAdd(a,aa); b=safeAdd(b,bb); c=safeAdd(c,cc); d=safeAdd(d,dd);
  }
  const hex = [a,b,c,d].map(v =>
    Array.from({length:4}, (_,i) => ((v>>(i*8))&0xff).toString(16).padStart(2,'0')).join('')
  ).join('');
  return hex;
}

// ── Password check ────────────────────────────────────────────────────────────
const TARGET_MD5 = md5('kp'); // precompute once

// ── DOM refs ──────────────────────────────────────────────────────────────────
const input      = document.getElementById('hidden-input');
const dotsText   = document.getElementById('dots-text');
const errorMsg   = document.getElementById('error-msg');
const canvas     = document.getElementById('matrix-canvas');
const loginScreen= document.getElementById('login-screen');
const ctx        = canvas.getContext('2d');

// Focus management
document.body.addEventListener('click', () => input.focus());
input.focus();

// Update dots on input
input.addEventListener('input', () => {
  const len = input.value.length;
  dotsText.textContent = '•'.repeat(len);
  errorMsg.textContent = '';
});

// Enter key
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const val = input.value;
    if (md5(val) === TARGET_MD5) {
      startMatrix();
    } else {
      errorMsg.textContent = 'Błędne hasło.';
      input.value = '';
      dotsText.textContent = '';
    }
  }
});

// ── Matrix rain ───────────────────────────────────────────────────────────────
function startMatrix() {
  loginScreen.style.display = 'none';

  // ✅ Zapisz domyślne imię w localStorage – żeby RW.html nie pytało
  localStorage.setItem('satori_userName', 'Krzysiu');

  // Load RW.html via srcdoc stub – przekierowuje od razu, ale imię jest już zapisane
  const iframe = document.createElement('iframe');
  iframe.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;border:none;z-index:1;';
  iframe.srcdoc = `<!DOCTYPE html><html><head><script>
    window.userName = 'Krzysiu';
    window.alert   = () => {};
    window.confirm = () => false;
    window.prompt  = () => null;
  <\/script></head><body><script>
    window.location.replace('RW.html');
  <\/script></body></html>`;

  // Po załadowaniu RW.html przywróć normalne funkcje dialogowe (ale imię już nie będzie pytane)
  iframe.addEventListener('load', () => {
    try {
      const iw = iframe.contentWindow;
      if (iw.location.href.includes('RW')) {
        iw.alert   = window.alert.bind(window);
        iw.confirm = window.confirm.bind(window);
        iw.prompt  = window.prompt.bind(window);
      }
    } catch(e) {}
  });

  document.body.appendChild(iframe);

  canvas.style.display = 'block';

  const W = canvas.width  = window.innerWidth;
  const H = canvas.height = window.innerHeight;

  const FONT_SIZE = 16;
  const COLS = Math.floor(W / FONT_SIZE);
  const ROWS = Math.floor(H / FONT_SIZE);

  // Katakana only
  const CHARS = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲンァィゥェォッャュョヴガギグゲゴザジズゼゾダヂヅデドバビブベボパピプペポ';

  // Each column: current head row position (float), speed, trail array
  const cols = Array.from({length: COLS}, () => ({
    head: -(Math.random() * ROWS),
    speed: 0.3 + Math.random() * 0.5,
    trail: new Float32Array(ROWS),
    chars: Array.from({length: ROWS}, () => randomChar()),
    charTimer: Array.from({length: ROWS}, () => 0),
  }));

  const FADE_RATE = 0.025;
  const TRAIL_LEN = 18;

  function randomChar() {
    return CHARS[Math.floor(Math.random() * CHARS.length)];
  }

  let firstColFinished = false;
  let fadeProgress = 0;

  function draw() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    ctx.font = `${FONT_SIZE}px 'Courier New', monospace`;
    ctx.textAlign = 'center';

    let activeCols = 0;

    for (let c = 0; c < COLS; c++) {
      const col = cols[c];
      const headRow = Math.floor(col.head);
      col.head += col.speed;

      for (let r = Math.max(0, headRow - TRAIL_LEN); r <= headRow && r < ROWS; r++) {
        const distFromHead = headRow - r;
        col.trail[r] = Math.max(col.trail[r], 1 - distFromHead / TRAIL_LEN);
      }

      for (let r = 0; r < ROWS; r++) {
        if (r < headRow - TRAIL_LEN || col.head > ROWS + TRAIL_LEN) {
          col.trail[r] = Math.max(0, col.trail[r] - FADE_RATE);
        }
        col.charTimer[r]++;
        if (col.charTimer[r] > 4 + Math.floor(Math.random() * 8)) {
          col.chars[r] = randomChar();
          col.charTimer[r] = 0;
        }
      }

      for (let r = 0; r < ROWS; r++) {
        const alpha = col.trail[r];
        if (alpha <= 0.01) continue;
        let color;
        if (r === headRow) {
          color = `rgba(180, 255, 200, ${alpha})`;
        } else {
          color = `rgba(0, 255, 0, ${alpha})`;
        }
        ctx.fillStyle = color;
        ctx.fillText(col.chars[r], c * FONT_SIZE + FONT_SIZE / 2, r * FONT_SIZE + FONT_SIZE);
      }

      const anyAlpha = col.trail.some(v => v > 0.01);
      const colActive = col.head <= ROWS + TRAIL_LEN + 5 || anyAlpha;
      if (colActive) activeCols++;

      // Pierwsza kolumna która całkowicie zniknęła startuje fading
      if (!firstColFinished && col.head > ROWS + TRAIL_LEN + 5 && !anyAlpha) {
        firstColFinished = true;
      }
    }

    // Fading canvas opacity gdy pierwsza kolumna skończyła
    if (firstColFinished) {
      fadeProgress = Math.min(1, fadeProgress + 0.012); // ~83 klatki ≈ 1.4s
      canvas.style.opacity = 1 - fadeProgress;
    }

    if (activeCols === 0 || fadeProgress >= 1) {
      canvas.remove();
      return;
    }

    requestAnimationFrame(draw);
  }

  draw();
}
</script>
</body>
</html>
